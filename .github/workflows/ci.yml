name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
      DATABASE_URL: sqlite:///${{ runner.temp }}/airetest-pytest.db
      ENVIRONMENT: test
      ARTIFACT_ROOT: ${{ runner.temp }}/artifacts

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            test-engine/pyproject.toml

      - name: Upgrade Python packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install backend requirements
        run: python -m pip install -r backend/requirements.txt

      - name: Install test engine package
        run: python -m pip install ./test-engine

      - name: Verify test engine import
        run: python -c "from test_engine.executor import TestCaseExecutor; print(TestCaseExecutor.__name__)"

      - name: Install static analysis reporters
        continue-on-error: true
        run: python -m pip install ruff mypy

      - name: Ruff report (non-blocking)
        continue-on-error: true
        run: python -m ruff check backend test-engine --config backend/pyproject.toml --output-format github

      - name: mypy backend report (non-blocking)
        continue-on-error: true
        run: python -m mypy backend/app --config-file backend/pyproject.toml --show-error-codes --no-error-summary

      - name: mypy test engine report (non-blocking)
        continue-on-error: true
        run: |
          TEST_ENGINE_SITE="$(
            python -c "from pathlib import Path; import test_engine; print(Path(test_engine.__file__).resolve().parent.parent)"
          )"
          MYPYPATH="$TEST_ENGINE_SITE" python -m mypy -p test_engine \
            --config-file backend/pyproject.toml \
            --show-error-codes \
            --no-error-summary

      - name: Run backend and test engine tests
        run: python -m pytest

      - name: Check Alembic migrations on empty SQLite database
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///${{ runner.temp }}/airetest-alembic.db
        run: |
          python -m alembic heads
          python -m alembic upgrade head
          python -m alembic check
          python -m alembic downgrade base

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    env:
      CI: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run TypeScript typecheck
        run: npm run typecheck

      - name: Run frontend lint
        run: npm run lint -- --quiet

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
