[pytest]
testpaths = backend/tests test-engine/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    api: 接口测试用例
    ui: UI 自动化用例
    e2e: 端到端用例
    stress: 压力测试
    db: 需要数据库的用例
    slow: 耗时较长的用例
    smoke: 冒烟测试
    regression: 回归测试
addopts = -ra --tb=short
