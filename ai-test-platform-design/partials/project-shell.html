<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 接口自动化测试平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    /* ===== Reset & Base ===== */
    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-body);
      background: var(--surface-base);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== Sidebar (200px, dark #0f172a, fixed left) ===== */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 200px;
      height: 100vh;
      background: #0f172a;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 20;
      box-shadow: 1px 0 4px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
    }

    .sidebar::-webkit-scrollbar {
      width: 4px;
    }
    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }
    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(203, 213, 225, 0.2);
      border-radius: 4px;
    }

    /* Logo area (48px height) */
    .sidebar-logo {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font-body);
      letter-spacing: 0.02em;
      border-bottom: 1px solid rgba(203, 213, 225, 0.1);
      flex-shrink: 0;
    }

    .sidebar-logo svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: #99f6e4;
      margin-right: 8px;
    }

    /* Nav section */
    .nav-section {
      padding: 12px 16px;
      flex: 1;
      overflow-y: auto;
    }

    /* Nav divider */
    .nav-divider {
      height: 1px;
      background: rgba(203, 213, 225, 0.1);
      margin: 8px 0;
    }

    /* Section header (10px uppercase #64748b, 12px top padding) */
    .nav-section-header {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      padding: 12px 16px 4px 16px;
      user-select: none;
    }

    /* Nav item */
    .nav-item {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      color: #94a3b8;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease;
      text-decoration: none;
      white-space: nowrap;
      border-left: 2px solid transparent;
      border-radius: 6px;
      margin: 1px 0;
      user-select: none;
    }

    .nav-item:hover {
      background: #1e293b;
      color: #f9fafb;
    }

    .nav-item[data-active="true"] {
      background: #1e293b;
      color: #ffffff;
      border-left-color: #4f46e5;
      border-radius: 0;
      margin-left: 0;
      padding-left: 16px;
    }

    .nav-item svg {
      width: 16px;
      height: 16px;
      margin-right: 10px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .nav-item[data-active="true"] svg {
      opacity: 1;
    }

    /* AI nav special teal glow */
    .nav-item.ai-nav {
      position: relative;
    }
    .nav-item.ai-nav[data-active="true"] {
      border-left-color: #0d9488;
      background: rgba(13, 148, 136, 0.1);
    }
    .nav-item.ai-nav::before {
      content: '';
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: #0d9488;
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(13, 148, 136, 0.5);
      opacity: 0;
      transition: opacity 150ms ease;
    }
    .nav-item.ai-nav[data-active="true"]::before {
      opacity: 1;
    }
    .nav-item.ai-nav svg {
      color: #99f6e4;
    }
    .nav-item.ai-nav[data-active="true"] svg {
      color: #99f6e4;
    }

    /* ===== Top Header (white, sticky, 56px height) ===== */
    .top-header {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 56px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #page-title-slot {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-date {
      font-size: 13px;
      color: #6b7280;
      user-select: none;
    }

    /* ===== Main Content Area ===== */
    .main-content {
      margin-left: 200px;
      min-height: calc(100vh - 56px);
      padding: 24px;
      background: var(--surface-base);
    }

    .content-card {
      background: #ffffff;
      border-radius: 8px;
      padding: 24px;
      min-height: 400px;
    }

    #page-content-slot {
      min-height: 400px;
    }
  </style>
</head>
<body>

  <!-- ===== Fixed Left Sidebar (200px, dark #0f172a) ===== -->

    <nav class="nav-section">

          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>

      <a class="nav-item" data-nav-key="mock-service" data-dom-id="nav-mock-service" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Mock 服务
      </a>

      <!-- 4. Section label: "UI 测试" -->
      <div class="nav-section-header">UI 测试</div>

      <a class="nav-item" data-nav-key="ui-test-cases" data-dom-id="nav-ui-test-cases" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>

      <a class="nav-item" data-nav-key="ui-elements" data-dom-id="nav-ui-elements" href="#">

          <path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h10"/>

      <a class="nav-item" data-nav-key="ui-test-records" data-dom-id="nav-ui-test-records" href="#">

      <a class="nav-item" data-nav-key="perf-tests" data-dom-id="nav-perf-tests" href="#">

      <a class="nav-item" data-nav-key="perf-reports" data-dom-id="nav-perf-reports" href="#">

        </svg>
        性能报告

      <!-- 6. section divider -->

      <!-- 7. 测试报告 -->

          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        定时任务

      <!-- 9. 环境管理 -->

  <!-- ===== Sticky Top Header (white, 56px, box-shadow) ===== -->

    <div class="header-left">
      <span id="page-title-slot">Page Title</span>
    </div>
    <div class="header-right">
      <span class="header-date">2026-07-08 星期三</span>
    </div>
  </header>

  <!-- ===== Main Content Area (margin-left: 200px, white card, 8px radius) ===== -->

    <div class="content-card">
      <div id="page-content-slot"></div>
    </div>
  </main>

</body>
</html>
