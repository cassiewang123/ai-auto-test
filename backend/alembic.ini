# Alembic configuration file
# Full options: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Migration scripts directory
script_location = alembic

# File name template for new revisions
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Database URL (overridden at runtime by env.py via app.config.get_settings().DATABASE_URL)
sqlalchemy.url = oracle+oracledb://airetest:airetest_dev@localhost:1521/?service_name=FREEPDB1

# Prepend the backend directory to sys.path so `app.*` imports work
prepend_sys_path = .

[post_write_hooks]
# Hooks executed after a migration script is generated (e.g. formatters)

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
